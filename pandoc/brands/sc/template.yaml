---
# Sovereign Computing Initiative Brand Configuration
# Editorial minimalism. Deep slate + terracotta accent.

# Brand identity
institute: Sovereign Computing Initiative
subject: ""

# ---------------------------------------------------------------
# Brand colour definitions
# Near-black slate base, terracotta accent, warm neutrals
# ---------------------------------------------------------------

brand-colours:
  # Core palette
  sci-slate: "1C2127"
  sci-terracotta: "C4654A"
  sci-warm: "F5F0EB"

  # Supporting tones
  sci-mid: "4A5568"
  sci-light: "8899A6"
  sci-stone: "E8E0D8"
  sci-terracotta-light: "F2DDD6"

  # Semantic aliases
  DeepPurple: "1C2127"
  TealBlue: "C4654A"
  DarkGray: "4A5568"

  # Template utility colours
  caption-color: "8899A6"
  heading-color: "1C2127"
  default-linkcolor: "C4654A"
  default-urlcolor: "C4654A"
  default-citecolor: "1C2127"

# ---------------------------------------------------------------
# Chart colours
# ---------------------------------------------------------------

chart-colours:
  - sci-slate
  - sci-terracotta
  - sci-mid
  - sci-light
  - sci-stone

# ---------------------------------------------------------------
# Box colours
# ---------------------------------------------------------------

box-colours:
  frame-info: sci-mid!70
  bg-info: sci-warm!50
  frame-accent: sci-terracotta!70
  bg-accent: sci-terracotta-light!20
  frame-highlight: sci-slate!70
  bg-highlight: sci-warm!40
  frame-contrast: sci-terracotta!70
  bg-contrast: sci-stone!30

# ---------------------------------------------------------------
# Title page colours
# ---------------------------------------------------------------

titlepage-color: sci-slate
titlepage-text-color: white
titlepage-rule-color: sci-terracotta

# Template and engine
template: eisvogel-wrapper
pdf-engine: xelatex
from: markdown-smart

# Document structure
book: true
documentclass: scrbook
top-level-division: chapter
minitoc: true
minitoc-depth: 2

numbersections: true
secnumdepth: 2
toc: true
toc-depth: 2

# Title page configuration
titlepage: true

# Typography - serif headings, humanist sans body
mainfont: "Source Sans Pro"
fontsize: 11pt

# Page layout
classoption:
  - oneside
margin-left: 2cm
margin-right: 5cm
margin-top: 2.5cm
margin-bottom: 2cm

# Headers and footers
header-center: ""
header-left: ""
header-right: ""
footer-left: ""
footer-center: ""

# Styling
colorlinks: true
footnotes-pretty: true
float-placement-figure: H
listings: true
linestretch: 1.25

# Endnotes configuration
endnotes-heading: References
footnotes-as-endnotes: true
endnotes-custom-heading: true
endnotes-symmetric-margins: true

# Code highlighting
pandoc-latex-environment:
  noteblock: [note]
  tipblock: [tip]
  warningblock: [warning]
  cautionblock: [caution]
  importantblock: [important]
  marginbox: [marginbox]
  examplebox: [examplebox]
  widebox: [widebox]
  textbox: [textbox]

# Structural LaTeX only (definecolor auto-generated from brand-colours)
header-includes: |
  \usepackage[default]{sourcesanspro}
  \usepackage{sourceserifpro}
  \usepackage{sourcecodepro}
  \addtokomafont{chapter}{\rmfamily\color{sci-slate}}
  \addtokomafont{section}{\rmfamily\color{sci-slate}}
  \addtokomafont{subsection}{\sffamily\color{sci-mid}}
  \addtokomafont{subsubsection}{\sffamily\color{sci-light}}
  \renewcommand{\arrayrulewidth}{0.4pt}
  \renewcommand{\arraystretch}{1.2}

---
