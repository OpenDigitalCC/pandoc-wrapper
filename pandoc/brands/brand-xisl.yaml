---
# Xi Software Brand Configuration
# Colours and identity from Xi Software Brand Kit

# Brand identity
institute: Xi Software Limited
subject: Xi Document

# ---------------------------------------------------------------
# Brand colour definitions
# All colours defined once here; auto-generated as \definecolor
# in LaTeX by document-filters.lua
# ---------------------------------------------------------------

brand-colours:
  # Primary brand palette (from brand kit)
  xi-primary: "A72E90"
  xi-dark: "6D1D5F"
  xi-light: "E148C6"
  xi-navy: "1F2A44"
  xi-grey: "6B6E70"
  xi-pale: "E8E4F0"
  xi-slate: "5A6473"

  # Semantic aliases (for komafont and template references)
  DeepPurple: "6D1D5F"
  TealBlue: "A72E90"
  DarkGray: "5A6473"

  # Template utility colours
  caption-color: "6B6E70"
  heading-color: "1F2A44"
  default-linkcolor: "A72E90"
  default-urlcolor: "6D1D5F"
  default-citecolor: "6D1D5F"

# ---------------------------------------------------------------
# Chart colours
# Ordered list of brand-colour names for chart segments
# ---------------------------------------------------------------

chart-colours:
  - xi-primary
  - xi-navy
  - xi-dark
  - xi-slate
  - xi-grey

# ---------------------------------------------------------------
# Box colours
# ---------------------------------------------------------------

box-colours:
  frame-info: xi-primary!90
  bg-info: xi-pale!30
  frame-accent: xi-dark!90
  bg-accent: xi-pale!20
  frame-highlight: xi-primary!90
  bg-highlight: xi-pale!20
  frame-contrast: xi-navy!90
  bg-contrast: xi-pale!10

# ---------------------------------------------------------------
# Title page colours
# ---------------------------------------------------------------

#titlepage-color: 
titlepage-text-color: xi-primary
titlepage-rule-color: xi-navy

# Template and engine
template: eisvogel-reorganized
pdf-engine: xelatex
from: markdown-smart

# Backpage config
backpage-publisher: "Xi Software Limited"
backpage-website: "https://xisl.com"

# Document structure
book: true
documentclass: scrbook
top-level-division: chapter
minitoc: true
minitoc-depth: 2

numbersections: true
secnumdepth: 2
toc: true
toc-depth: 2

# Title page configuration
titlepage: true
titlepage-logo: /home/sjm/Nextcloud/SJM/Work shares/Companies/Xi/Internal/Graphics/logo-v3.png

# Typography
mainfont: "Open Sans"
fontsize: 11pt

# Page layout
classoption:
  - oneside
margin-left: 2cm
margin-right: 5cm
margin-top: 2cm
margin-bottom: 1.5cm

# Headers and footers
header-center: ""
header-left: ""
header-right: ""
footer-left: CONFIDENTIAL
footer-center: ""

# Styling
colorlinks: true
footnotes-pretty: true
float-placement-figure: H
listings: true

# Endnotes configuration
endnotes-heading: References
footnotes-as-endnotes: true
endnotes-custom-heading: true
endnotes-symmetric-margins: true

# Code highlighting
pandoc-latex-environment:
  noteblock: [note]
  tipblock: [tip]
  warningblock: [warning]
  cautionblock: [caution]
  importantblock: [important]
  marginbox: [marginbox]
  examplebox: [examplebox]
  widebox: [widebox]
  textbox: [textbox]

# Structural LaTeX only (definecolor auto-generated from brand-colours)
header-includes: |
  \usepackage{fontawesome5}
  \usepackage[default]{sourcesanspro}
  \usepackage{sourcecodepro}
  \usepackage{microtype}
  \usepackage{parskip}
  \usepackage{longtable,booktabs,colortbl}
  \usepackage{tabularx}
  \usepackage[table]{xcolor}
  \usepackage{markdown}
  \usepackage[labelfont=bf]{caption}
  \usepackage{pgf-pie}
  \usepackage{pgfplots}
  \usepackage{wrapfig}
  \renewcommand*{\chapterpagestyle}{eisvogel-header-footer}
  \addtokomafont{chapter}{\color{xi-navy}}
  \addtokomafont{section}{\color{xi-primary}}
  \addtokomafont{subsection}{\color{xi-primary}}
  \addtokomafont{subsubsection}{\color{xi-slate}}
  \RedeclareSectionCommand[tocbeforeskip=0.2em]{section}
  \RedeclareSectionCommand[tocindent=0pt]{section}
  \hyphenpenalty=5000
  \tolerance=1000
  \renewcommand{\arrayrulewidth}{1mm}
  \renewcommand{\arraystretch}{2}
  \renewcommand{\tabcolsep}{2mm}
  \setkeys{Gin}{width=1\textwidth,keepaspectratio}
  \pgfplotsset{compat=1.18}

---
