---
# Open Digital Consulting Brand Configuration
# This file defines brand identity and styling for ODCC documents

# Brand identity
institute: The Perl and Raku Foundation
#subject: 

## Colours

# ---------------------------------------------------------------
# Brand colour definitions
# All colours defined once here; auto-generated as \definecolor
# in LaTeX by document-filters.lua
# ---------------------------------------------------------------

brand-colours:
  tprf-blue: "3B7A9E"
  tprf-orange: "E08A52"
  tprf-yellow: "F0D264"
  tprf-green: "4CAF82"
  tprf-maroon: "9A6478"
  tprf-blue-light: "D8EBF2"
  tprf-orange-light: "F7E0CF"
  tprf-yellow-light: "FBF2D4"
  tprf-green-light: "D6EDE2"
  tprf-maroon-light: "EEDBE1"
  tprf-text-dark: "1A1A2E"
  tprf-text-mid: "555555"
  tprf-text-light: "FFFFFF"
  onion-1: "40426C"
  onion-2: "6B6C8D"
  onion-3: "7E809C"
  onion-4: "9092AA"
  onion-5: "A5A6BA"
  onion-6: "B5B6C6"
  onion-7: "CBCBD6"

# ---------------------------------------------------------------
# Chart colours
# Ordered list of brand-colour names for chart segments
# First entry used for largest segment
# ---------------------------------------------------------------

chart-colours:
  - tprf-blue
  - tprf-orange
  - tprf-yellow
  - tprf-green
  - tprf-maroon

# ---------------------------------------------------------------
# Box colours
# Semantic names mapped to LaTeX colour expressions
# Supports mixing syntax (e.g. tprf-green!90)
# ---------------------------------------------------------------

box-colours:
  frame-info: tprf-green!90
  bg-info: tprf-blue-light!10
  frame-accent: tprf-blue!90
  bg-accent: tprf-blue-light!10
  frame-highlight: tprf-blue!90
  bg-highlight: tprf-blue-light!10
  frame-contrast: tprf-maroon!90
  bg-contrast: tprf-maroon-light!10

# ---------------------------------------------------------------
# Title page colours
# Resolved from brand-colour names by document-filters.lua
# Also accepts raw hex or convenience names (white, black)
# ---------------------------------------------------------------

titlepage-color: tprf-blue
titlepage-text-color: white
titlepage-rule-color: tprf-orange



# Template and engine
template: eisvogel-reorganized
pdf-engine: xelatex
from: markdown-smart

# Backpage config
backpage-publisher: "The Perl and Raku Foundation"
backpage-website: "https://perlfoundation.org"

# Document structure
book: true
documentclass: scrbook
top-level-division: chapter
minitoc: true
minitoc-depth: 2

numbersections: true
secnumdepth: 2
toc: true
toc-depth: 2

# Title page configuration
titlepage: true
titlepage-background: /home/sjm/Nextcloud/SJM/Work shares/External/TPRF/Stationary/titlepage.pdf

# Typography
mainfont: "Open Sans"
fontsize: 11pt

# Page layout
classoption:
  - oneside
margin-left: 2cm
margin-right: 5cm
margin-top: 2cm
margin-bottom: 1.5cm

# Headers and footers
header-center: ""
header-left: ""
header-right: ""
footer-left: ""
footer-center: ""

# Styling
colorlinks: true
footnotes-pretty: true
float-placement-figure: H
listings: true

# Endnotes configuration
endnotes-heading: References
footnotes-as-endnotes: true
endnotes-custom-heading: true
endnotes-symmetric-margins: true

# Code highlighting

pandoc-latex-environment:
  noteblock: [note]
  tipblock: [tip]
  warningblock: [warning]
  cautionblock: [caution]
  importantblock: [important]
  marginbox: [marginbox]
  examplebox: [examplebox]
  widebox: [widebox]
  textbox: [textbox]


# Structural LaTeX (definecolor auto-generated from brand-colours)
header-includes: |

  \usepackage{xcolor}
  \usepackage{fontawesome5}
  \usepackage{longtable}
  \usepackage[default]{sourcesanspro}
  \usepackage{sourcecodepro}
  \usepackage{microtype}
  \usepackage{parskip}
  \usepackage{longtable,booktabs,colortbl}
  \usepackage{tabularx}
  \usepackage[table]{xcolor}
  \usepackage[labelfont={}, textfont=bf]{caption}
  \usepackage{pgf-pie}
  \usepackage{pgfplots}
  \usepackage{wrapfig}
  \renewcommand*{\chapterpagestyle}{eisvogel-header-footer}
  \RedeclareSectionCommand[tocbeforeskip=0.2em]{section}
  \RedeclareSectionCommand[tocindent=0pt]{section}
  \hyphenpenalty=5000
  \tolerance=1000
  \renewcommand{\arrayrulewidth}{1mm}
  \renewcommand{\arraystretch}{1.1}
  \renewcommand{\tabcolsep}{2mm}
  \setkeys{Gin}{width=1\textwidth,keepaspectratio}
  \pgfplotsset{compat=1.18}

---
