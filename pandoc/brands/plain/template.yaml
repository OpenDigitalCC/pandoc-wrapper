---
# Plain Brand Configuration
#
# The default brand: a clean, professional, unaffiliated style. It is also the
# reference to copy when creating a new brand - it is deliberately neutral and
# exercises every brand setting. To make a new brand:
#
#   cp -r plain <your-brand>     (in your brands base; see README.md)
#   # edit colours, fonts, identity, and the title-page logo/cover below
#
# Brand identity
institute: ""
subject: ""

# ---------------------------------------------------------------
# Brand colour definitions
# Neutral professional palette - no organisational association
# ---------------------------------------------------------------

brand-colours:
  # Primary palette - warm neutrals with a single quiet accent
  plain-charcoal: "2C3E50"
  plain-steel: "5D6D7E"
  plain-slate: "85929E"
  plain-silver: "AEB6BF"
  plain-accent: "2980B9"

  # Light tones
  plain-light: "F2F4F5"
  plain-warm: "FAFAF8"
  plain-accent-light: "D6EAF5"

  # Text
  plain-text: "2C3E50"
  plain-text-mid: "5D6D7E"
  plain-text-light: "FFFFFF"

  # Template utility colours
  caption-color: "85929E"
  heading-color: "2C3E50"
  default-linkcolor: "2980B9"
  default-urlcolor: "2980B9"
  default-citecolor: "2C3E50"

# ---------------------------------------------------------------
# Chart colours
# ---------------------------------------------------------------

chart-colours:
  - plain-charcoal
  - plain-accent
  - plain-steel
  - plain-slate
  - plain-silver

# ---------------------------------------------------------------
# Box colours
# ---------------------------------------------------------------

box-colours:
  frame-info: plain-steel!80
  bg-info: plain-light!50
  frame-accent: plain-accent!80
  bg-accent: plain-accent-light!20
  frame-highlight: plain-charcoal!80
  bg-highlight: plain-light!40
  frame-contrast: plain-slate!80
  bg-contrast: plain-light!30

# ---------------------------------------------------------------
# Title page colours
# ---------------------------------------------------------------

titlepage-color: plain-charcoal
titlepage-text-color: white
titlepage-rule-color: plain-steel

# Template and engine
template: eisvogel-wrapper
pdf-engine: xelatex

# Beamer (slides): applied only when a document selects template: beamer.
# Names refer to brand-colours above; the document keeps full control of the
# beamer theme/colortheme and can override these in its own header-includes.
beamer-structure: plain-charcoal
beamer-accent: plain-accent
from: markdown-smart

# Document structure
book: true
documentclass: scrbook
top-level-division: chapter
minitoc: true
minitoc-depth: 2

numbersections: true
secnumdepth: 2
toc: true
toc-depth: 2

# Title page configuration
titlepage: true

# --- Title-page logo (drop logo.png into this brand folder, then uncomment) ---
# titlepage-logo: logo.png
# logo-width: 35mm

# --- OR a full-page PDF/image cover (drop cover.pdf in, then uncomment).
#     This replaces the generated title-page layout with your artwork. ---
# titlepage-background: cover.pdf

# Typography
mainfont: "Open Sans"
fontsize: 11pt

# Page layout
classoption:
  - oneside
margin-left: 2cm
margin-right: 5cm
margin-top: 2cm
margin-bottom: 1.5cm

# Headers and footers
header-center: ""
header-left: ""
header-right: ""
footer-left: ""
footer-center: ""

# Styling
colorlinks: true
footnotes-pretty: true
float-placement-figure: H
listings: true

# Endnotes configuration
endnotes-heading: References
footnotes-as-endnotes: true
endnotes-custom-heading: true
endnotes-symmetric-margins: true

# Code highlighting
pandoc-latex-environment:
  noteblock: [note]
  tipblock: [tip]
  warningblock: [warning]
  cautionblock: [caution]
  importantblock: [important]
  marginbox: [marginbox]
  examplebox: [examplebox]
  widebox: [widebox]
  textbox: [textbox]

# Structural LaTeX only (definecolor auto-generated from brand-colours)
header-includes: |
  \usepackage[default]{sourcesanspro}
  \usepackage{sourcecodepro}
  \addtokomafont{chapter}{\color{plain-charcoal}}
  \addtokomafont{section}{\color{plain-charcoal}}
  \addtokomafont{subsection}{\color{plain-steel}}
  \addtokomafont{subsubsection}{\color{plain-slate}}

---
