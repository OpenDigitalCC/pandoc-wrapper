---
# =====================================================================
# Example brand - copy this folder to <your-brand-name>/ and edit.
#
# A brand is a folder:  <brands-base>/<name>/template.yaml  (+ assets).
# Select it from a document with:  brand: <name>
# Assets (logos, cover/title-page PDFs) live in this same folder and are
# referenced by bare filename - the build puts this folder on the search
# path automatically.
#
# This file renders out of the box. The title-page logo and cover lines
# are commented out so it works before you add any image; uncomment them
# once you drop the files in (see README.md).
# =====================================================================

# ---------------------------------------------------------------
# Identity
# ---------------------------------------------------------------
institute: ""
subject: ""

# ---------------------------------------------------------------
# Brand colours (name -> hex). Used by \color{...}, boxes, charts,
# and the title page. The pipeline auto-generates \definecolor lines.
# ---------------------------------------------------------------
brand-colours:
  ex-primary: "2C3E50"
  ex-accent:  "2980B9"
  ex-mid:     "5D6D7E"
  ex-light:   "F2F4F5"
  ex-grey:    "85929E"

chart-colours:
  - ex-primary
  - ex-accent
  - ex-mid
  - ex-grey

box-colours:
  frame-info: ex-mid!80
  bg-info: ex-light!50
  frame-accent: ex-accent!80
  bg-accent: ex-accent!10
  frame-highlight: ex-primary!80
  bg-highlight: ex-light!40
  frame-contrast: ex-grey!80
  bg-contrast: ex-light!30

# ---------------------------------------------------------------
# Template selection and document structure
# ---------------------------------------------------------------
template: eisvogel-wrapper        # or: mvp
pdf-engine: xelatex
from: markdown-smart

book: true
documentclass: scrbook
top-level-division: chapter
numbersections: true
secnumdepth: 2
toc: true
toc-depth: 2
minitoc: true
minitoc-depth: 2

# ---------------------------------------------------------------
# Title page
# ---------------------------------------------------------------
titlepage: true
titlepage-color: ex-primary
titlepage-text-color: white
titlepage-rule-color: ex-accent

# --- Logo on the generated title page (add logo.png to this folder) ---
# titlepage-logo: logo.png
# logo-width: 35mm

# --- OR use a full-page PDF/image as the title-page background/cover ---
#     (add cover.pdf to this folder; this overrides the generated layout)
# titlepage-background: cover.pdf

# ---------------------------------------------------------------
# Typography
# ---------------------------------------------------------------
mainfont: "Open Sans"
fontsize: 11pt

# ---------------------------------------------------------------
# Page layout
# ---------------------------------------------------------------
classoption:
  - oneside
margin-left: 2cm
margin-right: 5cm
margin-top: 2cm
margin-bottom: 1.5cm

# ---------------------------------------------------------------
# Endnotes / references
# ---------------------------------------------------------------
colorlinks: true
footnotes-pretty: true
float-placement-figure: H
endnotes-heading: References
footnotes-as-endnotes: true
endnotes-custom-heading: true

pandoc-latex-environment:
  noteblock: [note]
  tipblock: [tip]
  warningblock: [warning]
  cautionblock: [caution]
  importantblock: [important]
  marginbox: [marginbox]
  examplebox: [examplebox]
  widebox: [widebox]
  textbox: [textbox]

# ---------------------------------------------------------------
# Brand-specific LaTeX: fonts and heading colours only.
# Everything common (packages, table/box/chart support) is provided by
# pipeline-preamble.tex via the template - do not re-add it here.
# ---------------------------------------------------------------
header-includes: |
  \usepackage[default]{sourcesanspro}
  \usepackage{sourcecodepro}
  \addtokomafont{chapter}{\color{ex-primary}}
  \addtokomafont{section}{\color{ex-primary}}
  \addtokomafont{subsection}{\color{ex-accent}}
  \addtokomafont{subsubsection}{\color{ex-grey}}

---
