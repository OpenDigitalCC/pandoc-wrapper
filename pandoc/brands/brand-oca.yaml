---
# Odoo Community Association Brand Configuration
# Colours extracted from OCA logo

# Brand identity
institute: Odoo Community Association
subject: OCA Document

# ---------------------------------------------------------------
# Brand colour definitions
# ---------------------------------------------------------------

brand-colours:
  # Primary brand palette (from logo)
  oca-navy: "141A46"
  oca-coral: "FC624D"

  # Derived tones
  oca-mid: "3D4570"
  oca-light: "8C90AD"
  oca-grey: "5A5E6E"
  oca-pale: "EEEEF4"
  oca-coral-light: "FDE0DB"
  oca-warm: "FDF5F4"

  # Semantic aliases
  DeepPurple: "141A46"
  TealBlue: "FC624D"
  DarkGray: "5A5E6E"

  # Template utility colours
  caption-color: "8C90AD"
  heading-color: "141A46"
  default-linkcolor: "FC624D"
  default-urlcolor: "FC624D"
  default-citecolor: "141A46"

# ---------------------------------------------------------------
# Chart colours
# ---------------------------------------------------------------

chart-colours:
  - oca-navy
  - oca-coral
  - oca-mid
  - oca-light
  - oca-grey

# ---------------------------------------------------------------
# Box colours
# ---------------------------------------------------------------

box-colours:
  frame-info: oca-navy!70
  bg-info: oca-pale!40
  frame-accent: oca-coral!70
  bg-accent: oca-coral-light!20
  frame-highlight: oca-navy!70
  bg-highlight: oca-pale!30
  frame-contrast: oca-coral!70
  bg-contrast: oca-warm!50

# ---------------------------------------------------------------
# Title page colours
# ---------------------------------------------------------------

titlepage-color: oca-navy
titlepage-text-color: white
titlepage-rule-color: oca-coral

# Template and engine
template: eisvogel-reorganized
pdf-engine: xelatex
from: markdown-smart

# Backpage config
backpage-publisher: "Odoo Community Association"
backpage-website: "https://odoo-community.org"

# Document structure
book: true
documentclass: scrbook
top-level-division: chapter
minitoc: true
minitoc-depth: 2

numbersections: true
secnumdepth: 2
toc: true
toc-depth: 2

# Title page configuration
titlepage: true
titlepage-logo: OCA-white.png
logo-width: 35mm

# Typography
mainfont: "Open Sans"
fontsize: 11pt

# Page layout
classoption:
  - oneside
margin-left: 2cm
margin-right: 5cm
margin-top: 2cm
margin-bottom: 1.5cm

# Headers and footers
header-center: ""
header-left: "Odoo Community Association"
header-right: ""
footer-left: ""
footer-center: ""

# Styling
colorlinks: true
footnotes-pretty: true
float-placement-figure: H
listings: true

# Endnotes configuration
endnotes-heading: References
footnotes-as-endnotes: true
endnotes-custom-heading: true
endnotes-symmetric-margins: true

# Code highlighting
pandoc-latex-environment:
  noteblock: [note]
  tipblock: [tip]
  warningblock: [warning]
  cautionblock: [caution]
  importantblock: [important]
  marginbox: [marginbox]
  examplebox: [examplebox]
  widebox: [widebox]
  textbox: [textbox]

# Structural LaTeX only (definecolor auto-generated from brand-colours)
header-includes: |
  \usepackage{fontawesome5}
  \usepackage[default]{sourcesanspro}
  \usepackage{sourcecodepro}
  \usepackage{microtype}
  \usepackage{parskip}
  \usepackage{longtable,booktabs,colortbl}
  \usepackage{tabularx}
  \usepackage[table]{xcolor}
  \usepackage{markdown}
  \usepackage[labelfont=bf]{caption}
  \usepackage{pgf-pie}
  \usepackage{pgfplots}
  \usepackage{wrapfig}
  \renewcommand*{\chapterpagestyle}{eisvogel-header-footer}
  \addtokomafont{chapter}{\color{oca-navy}}
  \addtokomafont{section}{\color{oca-navy}}
  \addtokomafont{subsection}{\color{oca-mid}}
  \addtokomafont{subsubsection}{\color{oca-light}}
  \RedeclareSectionCommand[tocbeforeskip=0.2em]{section}
  \RedeclareSectionCommand[tocindent=0pt]{section}
  \hyphenpenalty=5000
  \tolerance=1000
  \renewcommand{\arrayrulewidth}{1mm}
  \renewcommand{\arraystretch}{1.1}
  \renewcommand{\tabcolsep}{2mm}
  \setkeys{Gin}{width=1\textwidth,keepaspectratio}
  \pgfplotsset{compat=1.18}

---
