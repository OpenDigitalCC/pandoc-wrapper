---
# Digital Health Commons Foundation Brand Configuration
# Colours and identity from DHCF Brand Guidelines

# Brand identity
institute: Digital Health Commons Foundation
subject: DHCF Document

# ---------------------------------------------------------------
# Brand colour definitions
# All colours defined once here; auto-generated as \definecolor
# in LaTeX by document-filters.lua
# ---------------------------------------------------------------

brand-colours:
  # Primary brand palette (from brand guidelines)
  dhcf-green: "15C592"
  dhcf-blue: "1655A3"
  dhcf-teal: "239396"

  # Derived tones
  dhcf-dark: "0E3D5C"
  dhcf-grey: "5A6473"
  dhcf-pale: "E0F5EE"
  dhcf-blue-light: "D8E6F3"

  # Semantic aliases (for komafont references)
  DeepPurple: "1655A3"
  TealBlue: "239396"
  DarkGray: "5A6473"

  # Template utility colours
  caption-color: "5A6473"
  heading-color: "0E3D5C"
  default-linkcolor: "1655A3"
  default-urlcolor: "239396"
  default-citecolor: "1655A3"

# ---------------------------------------------------------------
# Chart colours
# ---------------------------------------------------------------

chart-colours:
  - dhcf-green
  - dhcf-blue
  - dhcf-teal
  - dhcf-dark
  - dhcf-grey

# ---------------------------------------------------------------
# Box colours
# ---------------------------------------------------------------

box-colours:
  frame-info: dhcf-green!90
  bg-info: dhcf-pale!30
  frame-accent: dhcf-blue!90
  bg-accent: dhcf-blue-light!20
  frame-highlight: dhcf-teal!90
  bg-highlight: dhcf-pale!20
  frame-contrast: dhcf-dark!90
  bg-contrast: dhcf-blue-light!10

# ---------------------------------------------------------------
# Title page colours
# ---------------------------------------------------------------

#titlepage-color: dhcf-green
#titlepage-text-color: white
titlepage-rule-color: dhcf-green

titlepage-background: "/home/sjm/Nextcloud/SJM/Work shares/Companies/DHCF/Graphics/pages/titlepage.pdf"
titlepage-logo: "/home/sjm/Nextcloud/SJM/Work shares/Companies/DHCF/Graphics/logo-full.png"
logo-width: 50mm


# Template and engine
template: eisvogel-reorganized
pdf-engine: xelatex
from: markdown-smart

# Backpage config
backpage-publisher: |
  Digital Health Commons Foundation,
  6 avenue des Hauts-Fourneaux, L-4362 Esch-sur-Alzette

backpage-website: "https://dhcf.org"
#page-background: "/home/sjm/Nextcloud/SJM/Work shares/Companies/DHCF/Graphics/pages/page.pdf"
page-background-opacity: 0.15



# Document structure
book: true
documentclass: scrbook
top-level-division: chapter
minitoc: true
minitoc-depth: 2

numbersections: true
secnumdepth: 2
toc: true
toc-depth: 2

# Title page configuration
titlepage: true

# Typography
mainfont: "Open Sans"
fontsize: 11pt

# Page layout
classoption:
  - oneside
margin-left: 2cm
margin-right: 5cm
margin-top: 2cm
margin-bottom: 1.5cm

# Headers and footers
header-center: ""
header-left: ""
header-right: ""
footer-left: ""
footer-center: ""

# Styling
colorlinks: true
footnotes-pretty: true
float-placement-figure: H
listings: true

# Endnotes configuration
endnotes-heading: References
footnotes-as-endnotes: true
endnotes-custom-heading: true
endnotes-symmetric-margins: true

# Code highlighting
pandoc-latex-environment:
  noteblock: [note]
  tipblock: [tip]
  warningblock: [warning]
  cautionblock: [caution]
  importantblock: [important]
  marginbox: [marginbox]
  examplebox: [examplebox]
  widebox: [widebox]
  textbox: [textbox]

# Structural LaTeX only (definecolor auto-generated from brand-colours)
header-includes: |
  \usepackage{fontawesome5}
  \usepackage[default]{sourcesanspro}
  \usepackage{sourcecodepro}
  \usepackage{microtype}
  \usepackage{parskip}
  \usepackage{longtable,booktabs,colortbl}
  \usepackage{tabularx}
  \usepackage[table]{xcolor}
  \usepackage{markdown}
  \usepackage[labelfont=bf]{caption}
  \usepackage{pgf-pie}
  \usepackage{pgfplots}
  \usepackage{wrapfig}
  \renewcommand*{\chapterpagestyle}{eisvogel-header-footer}
  \addtokomafont{chapter}{\color{dhcf-blue}}
  \addtokomafont{section}{\color{dhcf-teal}}
  \addtokomafont{subsection}{\color{dhcf-teal}}
  \addtokomafont{subsubsection}{\color{dhcf-grey}}
  \RedeclareSectionCommand[tocbeforeskip=0.2em]{section}
  \RedeclareSectionCommand[tocindent=0pt]{section}
  \hyphenpenalty=5000
  \tolerance=1000
  \renewcommand{\arrayrulewidth}{1mm}
  \renewcommand{\arraystretch}{1.1}
  \renewcommand{\tabcolsep}{2mm}
  \setkeys{Gin}{width=1\textwidth,keepaspectratio}
  \pgfplotsset{compat=1.18}

---
